# CI for the shared platform backend (docs/architecture/13-cicd-pipeline.md).
#
# WHY these gates block merges: the platform's core promises — tenant isolation (doc 04),
# deny-by-default authorization (doc 03), and immutable/tamper-evident audit (doc 06) — are only real
# if they cannot silently regress. The test job runs the invariant suites; a change that breaks
# isolation, authorization, or audit fails here and cannot merge.
name: platform-ci

on:
  push:
    branches: ["**"]
    paths:
      - "platform/**"
      - ".github/workflows/platform-ci.yml"
  pull_request:
    paths:
      - "platform/**"
      - ".github/workflows/platform-ci.yml"

defaults:
  run:
    working-directory: platform

jobs:
  build-and-test:
    runs-on: ubuntu-latest
    services:
      # A throwaway Postgres so the Genesis integration tests exercise real Row-Level Security in CI
      # (doc 04, doc 13) rather than skipping. The isolation invariant is proven end to end here.
      postgres:
        image: postgres:16
        env:
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: ft_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U postgres"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 10

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
          cache-dependency-path: platform/pnpm-lock.yaml

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Format check
        run: pnpm format:check

      - name: Typecheck (strict)
        run: pnpm typecheck

      - name: Test (incl. tenant-isolation, authorization, audit, and real-Postgres RLS invariants)
        run: pnpm test:coverage
        env:
          FT_TEST_DATABASE_URL: postgres://postgres:postgres@localhost:5432/ft_test

name: Build & Deploy Web (phone link)

# Builds the Flutter app as a website and publishes it to GitHub Pages,
# so it can be opened from any phone browser at:
#   https://sdlindley2903.github.io/loaves_lamps_ledgers/
#
# Runs automatically when the kids branch or main changes, and can also be
# started by hand from the Actions tab (Run workflow).
#
# NOTE: GitHub Pages must be turned on once by the repo owner:
#   Settings -> Pages -> Build and deployment -> Source -> "GitHub Actions".
# The build (compile) step runs regardless; only the final publish step
# needs Pages to be enabled.

on:
  push:
    branches:
      - claude/kids-kindling-animations-5mqis9
      - main
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Get the code
        uses: actions/checkout@v4

      - name: Install Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: stable

      - name: Download project pieces
        run: flutter pub get

      - name: Build the website (this also compiles + checks the app)
        # base-href must match the repo name so links work on Pages.
        # --pwa-strategy=none disables the offline service worker so browsers
        # don't get stuck showing a cached old version after each update.
        run: flutter build web --release --pwa-strategy=none --base-href "/loaves_lamps_ledgers/"

      - name: Package the website for Pages
        uses: actions/upload-pages-artifact@v3
        with:
          path: build/web

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Publish to the web
        id: deployment
        uses: actions/deploy-pages@v4
